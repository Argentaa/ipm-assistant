<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPM Assistant</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a2e;
      background: #ffffff;
      width: 320px;
      padding: 0;
    }

    /* ─── Header ─── */
    .header {
      background: linear-gradient(135deg, #1a73e8, #1557b0);
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
    }

    .header .indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .header .indicator.active {
      background: #4ade80;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.6);
    }

    .header .indicator.inactive {
      background: #94a3b8;
    }

    /* ─── Body ─── */
    .body {
      padding: 12px 16px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f1f3f5;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .label {
      color: #6c757d;
      font-size: 12px;
    }

    .value {
      font-weight: 500;
      font-size: 12px;
    }

    .value.yes {
      color: #28a745;
    }

    .value.no {
      color: #dc3545;
    }

    /* ─── Buttons ─── */
    .actions {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-top: 1px solid #e9ecef;
    }

    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: center;
    }

    .btn-primary {
      background: #1a73e8;
      color: white;
    }

    .btn-primary:hover {
      background: #1557b0;
    }

    .btn-secondary {
      background: #e9ecef;
      color: #495057;
    }

    .btn-secondary:hover {
      background: #dee2e6;
    }

    .btn-success {
      background: #28a745;
      color: white;
    }

    .btn-success:hover {
      background: #218838;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .footer {
      padding: 8px 16px;
      background: #f8f9fa;
      font-size: 10px;
      color: #adb5bd;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>IPM Assistant</h1>
    <span class="indicator inactive" id="status-indicator" title="Status"></span>
  </div>

  <div class="body">
    <div class="info-row">
      <span class="label">Extensão ativa</span>
      <span class="value yes" id="ext-active">Sim ✓</span>
    </div>
    <div class="info-row">
      <span class="label">Trigger recente</span>
      <span class="value no" id="trigger-status">Nenhum</span>
    </div>
    <div class="info-row">
      <span class="label">URL atual</span>
      <span class="value" id="current-url" style="max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">—</span>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="btn-toggle-overlay">🔲 Alternar Overlay</button>
    <button class="btn btn-secondary" id="btn-refresh">🔄 Atualizar Status</button>
  </div>

  <div class="footer">
    IPM Overlay Assistant v1.0
  </div>

  <script src="popup.js"></script>
</body>
</html>
